<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Mise SEC - Control de Asistencia</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  
  <style>
    /* VARIABLES DE COLOR */
    :root {
      --primary: #2c3e50;
      --secondary: #3498db;
      --success: #27ae60;
      --bg: #000000; 
      --card: #B3B3F2; 
      --text: #333;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 600px;
      background: var(--card);
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .header-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 3px solid var(--secondary);
      margin-bottom: 20px;
      padding-bottom: 10px;
    }

    .header-container h2 { margin: 0; color: var(--primary); }
    .logo { max-height: 50px; width: auto; }

    h3 { color: var(--primary); margin-top: 30px; }
    label { font-weight: 600; display: block; margin-bottom: 8px; color: #444; }

    select, input[type="date"] {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: 1px solid #999;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
      background-color: white;
    }

    /* TARJETAS DE ALUMNOS */
    #lista-alumnos div[data-id] {
      background: #fafafa;
      border-left: 5px solid var(--secondary);
      padding: 4px 10px;
      margin-bottom: 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 4px;
    }

    .alumno-nombre { 
      font-size: 0.85em; 
      font-weight: 500;
      margin-bottom: 0;
      flex: 1; 
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--primary);
    }

    .selector-hora select {
      padding: 2px 5px;
      height: 24px;
      font-size: 10px;
      margin: 0;
      width: auto;
      border-radius: 4px;
      border: 1px solid #ccc;
      font-weight: bold;
    }

    .selector-hora span { font-size: 11px; color: #666; margin-left: 5px; }

    /* COLORES DINÁMICOS */
    .estado-ausente { background-color: #ffcccc !important; color: #900 !important; border-color: #f00 !important; }
    .estado-tarde { background-color: #AAC2E3 !important; color: #0848A3 !important; border-color: #0452B5 !important; }
    .estado-presente { background-color: #e6ffcc !important; color: #060 !important; border-color: #080 !important; }

    #guardar {
      width: 100%;
      background-color: var(--success);
      color: white;
      padding: 15px;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
    }

    #guardar:disabled { background-color: #7f8c8d; }
    #mensaje { margin-top: 15px; text-align: center; font-weight: bold; }
    hr { border: 0; border-top: 1px solid #999; margin: 25px 0; }

    /* Botones de acción repetida */
    .btn-alerta { padding: 10px 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; }
    .btn-reemplazar { background-color: var(--success); }
    .btn-salir { background-color: #e74c3c; }
  </style>
</head>
<body>

<div class="container">
  <div class="header-container">
    <h2>Asistencia</h2>
    <img src="Logo Mise 2025.png" alt="Logo" class="logo">
  </div>

  <label for="fecha">📅 Fecha de clase:</label>
  <input type="date" id="fecha" />

  <label for="profesor">👤 Profesor:</label>
  <select id="profesor" disabled></select>

  <label for="materia">📚 Materia:</label>
  <select id="materia" disabled></select>

  <label for="curso">🏫 Curso:</label>
  <select id="curso" disabled></select>

<label for="cant-horas">⏱️ Cantidad de horas:</label>
<select id="cant-horas">
  <option value="1">1 Hora</option>
  <option value="2" selected>2 Horas</option>
</select>

  <hr>

  <h3>Lista de Alumnos</h3>
  <div id="lista-alumnos"></div>
  <div id="mensaje"></div>
  <button id="guardar" disabled>Guardar asistencia</button>
</div>

<script>
const supabaseClient = supabase.createClient(
  "https://htdmgshocecsuiykwwmt.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh0ZG1nc2hvY2Vjc3VpeWt3d210Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NjcxMjQsImV4cCI6MjA4NjI0MzEyNH0.HrIEsg7Pi2a7bha7-jCLB3tuZKJLzx9M9YHiDJw4usQ"
);

const fecha = document.getElementById("fecha");
const profesor = document.getElementById("profesor");
const materia = document.getElementById("materia");
const curso = document.getElementById("curso");
const lista_alumnos = document.getElementById("lista-alumnos");
const guardar = document.getElementById("guardar");
const mensaje = document.getElementById("mensaje");

function actualizarColor(elemento) {
    const valor = elemento.value;
    elemento.classList.remove('estado-ausente', 'estado-tarde', 'estado-presente');
    if (valor === "ausente") elemento.classList.add('estado-ausente');
    else if (valor === "tarde") elemento.classList.add('estado-tarde');
    else if (valor === "presente") elemento.classList.add('estado-presente');
}

function resetFormulario() {
  fecha.value = "";
  profesor.innerHTML = `<option value="">Seleccionar profesor</option>`;
  materia.innerHTML = `<option value="">Seleccionar materia</option>`;
  curso.innerHTML = `<option value="">Seleccionar curso</option>`;
  lista_alumnos.innerHTML = "";
  profesor.disabled = true;
  materia.disabled = true;
  curso.disabled = true;
  guardar.disabled = true;
  guardar.textContent = "Guardar asistencia";
  mensaje.innerHTML = "";
  cargarProfesores();
}

async function cargarProfesores() {
  const { data, error } = await supabaseClient.from("profesores").select("id, nombre").order("nombre");
  if (error) return;
  profesor.innerHTML = `<option value="">Seleccionar profesor</option>`;
  data.forEach(p => { profesor.innerHTML += `<option value="${p.id}">${p.nombre}</option>`; });
}

async function cargarMaterias(profesorId) {
  materia.innerHTML = `<option value="">Seleccionar materia</option>`;
  const { data: rel } = await supabaseClient.from("profesores_materias").select("materia_id").eq("profesor_id", profesorId);
  if (!rel || !rel.length) return;
  const ids = rel.map(r => r.materia_id);
  const { data } = await supabaseClient.from("materias").select("id, nombre").in("id", ids).order("nombre");
  materia.disabled = false;
  data.forEach(m => { materia.innerHTML += `<option value="${m.id}">${m.nombre}</option>`; });
}

async function cargarCursos(profesorId, materiaId) {
  curso.innerHTML = `<option value="">Seleccionar curso</option>`;
  const { data: rel } = await supabaseClient.from("profesores_materias_curso").select("curso_id").eq("profesor_id", profesorId).eq("materia_id", materiaId);
  if (!rel || !rel.length) return;
  const ids = rel.map(r => r.curso_id);
  const { data } = await supabaseClient.from("curso").select("id, nombre, curso_base").in("id", ids).order("nombre");
  curso.disabled = false;
  data.forEach(c => { curso.innerHTML += `<option value="${c.id}">${c.nombre} (${c.curso_base})</option>`; });
}

async function cargarAlumnos(cursoId) {
  const horasElegidas = document.getElementById("cant-horas").value; // Leemos 1 o 2
  lista_alumnos.innerHTML = "Cargando alumnos...";
  
  const { data: rel } = await supabaseClient.from("alumnos_por_curso").select("alumno_id").eq("curso_id", cursoId);
  if (!rel || !rel.length) { lista_alumnos.innerHTML = "No hay alumnos en este curso"; return; }
  
  const ids = rel.map(r => r.alumno_id);
  const { data } = await supabaseClient.from("alumnos").select("id, nombre, apellido").in("id", ids).order("apellido");
  lista_alumnos.innerHTML = "";
  
  data.forEach(a => {
    // Creamos la columna de la Hora 1 (siempre está)
    let selectoresHtml = `
      <span>H1:</span>
      <select class="h1 estado-presente" onchange="actualizarColor(this)">
        <option value="presente" selected>Presente</option>
        <option value="ausente">Ausente</option>
        <option value="tarde">Tarde</option>
      </select>`;

    // Si eligió 2 horas, agregamos la columna de la Hora 2
    if (horasElegidas === "2") {
      selectoresHtml += `
        <span>H2:</span>
        <select class="h2 estado-presente" onchange="actualizarColor(this)">
          <option value="presente" selected>Presente</option>
          <option value="ausente">Ausente</option>
          <option value="tarde">Tarde</option>
        </select>`;
    }

    lista_alumnos.innerHTML += `
      <div data-id="${a.id}">
        <b class="alumno-nombre">${a.apellido}, ${a.nombre}</b>
        <div class="selector-hora">
          ${selectoresHtml}
        </div>
      </div>`;
  });
  guardar.disabled = false;
}

fecha.onchange = () => { profesor.disabled = !fecha.value; };
profesor.onchange = () => { if (profesor.value) cargarMaterias(profesor.value); };
materia.onchange = () => { if (materia.value) cargarCursos(profesor.value, materia.value); };
curso.onchange = () => { if (curso.value) cargarAlumnos(curso.value); };

// Lógica de Guardado con reemplazo
guardar.onclick = () => ejecutarGuardado(false);

async function ejecutarGuardado(forzar = false) {
  // --- ESCUDO DE VALIDACIÓN ---
  if (!fecha.value || !profesor.value || !materia.value || !curso.value) {
    mensaje.style.color = "red";
    mensaje.textContent = "❌ Por favor, completa todos los campos superiores antes de guardar.";
    return;
  }
  // -----------------------------

  guardar.disabled = true;
  guardar.textContent = "🚀 Procesando...";
  mensaje.innerHTML = "";
  
  // ... resto del código ...
  
  const filas = document.querySelectorAll("#lista-alumnos div[data-id]");
  const registros = [];

  filas.forEach(f => {
    const datoAlumno = {
      fecha: fecha.value,
      profesor_id: profesor.value,
      materia_id: materia.value,
      curso_id: curso.value,
      alumno_id: f.dataset.id,
      hora1: f.querySelector(".h1").value,
      hora2: f.querySelector(".h2") ? f.querySelector(".h2").value : null // Si no existe H2, manda null
    };
    registros.push(datoAlumno);
  });

  // Si forzar es true, usa upsert para reemplazar
  const query = forzar 
    ? supabaseClient.from("asistencia").upsert(registros, { onConflict: 'fecha,profesor_id,materia_id,curso_id,alumno_id' })
    : supabaseClient.from("asistencia").insert(registros);

  const { error } = await query;

  if (error) {
    if (error.code === "23505") {
      // Error de duplicado
      mostrarPreguntaSobrescribir();
    } else {
      mensaje.style.color = "red";
      mensaje.textContent = "❌ Error: " + error.message;
      guardar.disabled = false;
      guardar.textContent = "Guardar asistencia";
    }
    return;
  }

  mensaje.style.color = "green";
  mensaje.innerHTML = "<b>✅ ¡Asistencia guardada con éxito!</b>";
  setTimeout(() => { resetFormulario(); }, 2000);
}

function mostrarPreguntaSobrescribir() {
  mensaje.style.color = "#d35400";
  mensaje.innerHTML = `
    <p>⚠️ Ya has cargado la asistencia para este curso pero ahora tiene cambios.<br>¿Quieres reemplazar la carga anterior por esta nueva?</p>
    <div style="display: flex; gap: 10px; justify-content: center; margin-top: 10px;">
      <button id="btn-continuar" class="btn-alerta btn-reemplazar">Continuar Guardando</button>
      <button id="btn-salir" class="btn-alerta btn-salir">SALIR</button>
    </div>
  `;

  document.getElementById("cant-horas").onchange = () => { if (curso.value) cargarAlumnos(curso.value); };
  document.getElementById("btn-continuar").onclick = () => ejecutarGuardado(true);
  document.getElementById("btn-salir").onclick = () => resetFormulario();
  
  guardar.disabled = false;
  guardar.textContent = "Guardar asistencia";
}

resetFormulario();
</script>
</body>
</html>
