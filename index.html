/* PROPIEDAD INTELECTUAL DE SANTIAGO FRANCO PROHIBIDA SU REPRODUCCIÓN TOTAL O PARCIAL SIN AUTORIZACIÓN. SISTEMA EXCLUSIVO PARA MISE SEC. */
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Mise SEC - Control de Asistencia</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    :root { --primary: #2c3e50; --secondary: #3498db; --success: #27ae60; --bg: #000; --card: #B3B3F2; }
    body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
    .container { width: 100%; max-width: 600px; background: var(--card); padding: 25px; border-radius: 12px; margin-bottom: 20px; }
    .header-container { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--secondary); margin-bottom: 20px; }
    .logo { max-height: 50px; }
    label { font-weight: 600; display: block; margin-bottom: 5px; color: #333; }
    select, input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #999; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
    
    #lista-alumnos div[data-id] { background: #fff; border-left: 5px solid var(--secondary); padding: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-radius: 4px; }
    .alumno-nombre { font-size: 1em; font-weight: 600; flex: 1; color: var(--primary); }
    .selector-hora { display: flex; align-items: center; gap: 8px; }
    .selector-hora select { width: auto; font-size: 12px; margin: 0; padding: 5px; }
    
    .estado-ausente { background-color: #ffcccc !important; color: #900 !important; }
    .estado-tarde { background-color: #AAC2E3 !important; color: #0848A3 !important; }
    .estado-presente { background-color: #e6ffcc !important; color: #060 !important; }
    
    #guardar { width: 100%; background: var(--success); color: white; padding: 15px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    #guardar:disabled { background: #7f8c8d; }
    #mensaje { margin-top: 15px; text-align: center; font-weight: bold; }
    .btn-alerta { padding: 12px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; margin: 5px; width: 100%; }
  </style>
</head>
<body>

<div id="login-container" class="container">
  <div class="header-container">
    <h2>Acceso Profesores</h2>
    <img src="Logo Mise 2025.png" class="logo">
  </div>
  <label>👤 Nombre de Usuario:</label>
  <input type="text" id="login-user" placeholder="Tu nombre">
  <label>🔑 Contraseña:</label>
  <input type="password" id="login-pass">
  <button id="btn-entrar" style="width: 100%; background: var(--secondary); color: white; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">Entrar al Sistema</button>
  <div id="login-error" style="color: red; text-align: center; margin-top: 10px;"></div>
</div>

<div id="app-content" class="container" style="display: none;">
  <label>📅 Fecha:</label>
  <input type="date" id="fecha">

  <label>👤 Profesor:</label>
  <select id="profesor" disabled><option value="">Seleccione fecha...</option></select>

  <label>📚 Materia:</label>
  <select id="materia" disabled><option value="">Seleccione profesor...</option></select>

  <label>⏱️ Cantidad de horas:</label>
  <select id="cant-horas" disabled>
    <option value="1">1 Hora</option>
    <option value="2" selected>2 Horas</option>
  </select>

  <label>🏫 Curso:</label>
  <select id="curso" disabled><option value="">Seleccione materia...</option></select>

  <hr>
  <div id="lista-alumnos"></div>
  <div id="mensaje"></div>
  <button id="guardar" disabled>Guardar asistencia</button>

  <div style="text-align: center; margin-top: 25px; padding-top: 15px; border-top: 1px solid rgba(0,0,0,0.1); font-size: 13px; color: #2c3e50;">
    Creador <b>Santiago Franco</b> © 2026
  </div>
</div>

<script>
/* PROPIEDAD INTELECTUAL DE SANTIAGO FRANCO PROHIBIDA SU REPRODUCCIÓN TOTAL O PARCIAL SIN AUTORIZACIÓN. */

// --- BLOQUEO DE PROTECCIÓN ---
document.addEventListener('contextmenu', event => event.preventDefault());
document.onkeydown = function(e) {
  if(e.keyCode == 123) return false; 
  if(e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 67 || e.keyCode == 74)) return false;
  if(e.ctrlKey && e.keyCode == 85) return false;
}

// --- CONFIGURACIÓN CLIENTE ---
const supabaseClient = supabase.createClient("https://htdmgshocecsuiykwwmt.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh0ZG1nc2hvY2Vjc3VpeWt3d210Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NjcxMjQsImV4cCI6MjA4NjI0MzEyNH0.HrIEsg7Pi2a7bha7-jCLB3tuZKJLzx9M9YHiDJw4usQ");

// --- ELEMENTOS ---
const fecha = document.getElementById("fecha"), profesor = document.getElementById("profesor"), materia = document.getElementById("materia"), horas = document.getElementById("cant-horas"), curso = document.getElementById("curso"), lista = document.getElementById("lista-alumnos"), btnG = document.getElementById("guardar"), mensaje = document.getElementById("mensaje");
const btnEntrar = document.getElementById("btn-entrar"), loginUser = document.getElementById("login-user"), loginPass = document.getElementById("login-pass"), loginContainer = document.getElementById("login-container"), appContent = document.getElementById("app-content"), loginError = document.getElementById("login-error");

// --- LÓGICA DE LOGIN ---
btnEntrar.onclick = async () => {
    const user = loginUser.value.trim().toLowerCase(); // Limpia espacios y pasa a minúsculas
    const pass = loginPass.value.trim(); // Limpia espacios en la clave

    if (!user || !pass) {
        loginError.textContent = "❌ Completa todos los campos";
        return;
    }

    btnEntrar.disabled = true;
    btnEntrar.textContent = "Verificando...";
    
    // IMPORTANTE: Asegúrate que en Supabase el mail sea EXACTAMENTE este:
    const emailSimulado = `${user}@mise.com`; 

    const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: emailSimulado,
        password: pass,
    });

    if (error) {
        console.log("Error de Supabase:", error.message); // Mira esto en la consola (F12)
        loginError.textContent = "❌ " + error.message; // Esto nos dirá el error real en pantalla
        btnEntrar.disabled = false;
        btnEntrar.textContent = "Entrar al Sistema";
    } else {
        loginContainer.style.display = "none";
        appContent.style.display = "block";
        
        // Auto-selección de profesor
        const selectorProfe = document.getElementById("profesor");
        const nombreLogueado = user; 

        for (let i = 0; i < selectorProfe.options.length; i++) {
            if (selectorProfe.options[i].text.toLowerCase() === nombreLogueado) {
                selectorProfe.selectedIndex = i;
                selectorProfe.disabled = true;
                selectorProfe.dispatchEvent(new Event('change'));
                break;
            }
        }
    }
};

// --- LÓGICA DE LA APP ---
function actualizarColor(el) {
  el.classList.remove('estado-ausente', 'estado-tarde', 'estado-presente');
  if (el.value) el.classList.add('estado-' + el.value);
}

fecha.onchange = async () => {
    if (!fecha.value) return;
    
    // 1. Cargamos la lista de profesores de la base de datos
    const { data } = await supabaseClient.from("profesores").select("*").order("nombre");
    
    profesor.innerHTML = '<option value="">Seleccionar...</option>';
    data.forEach(p => {
        profesor.innerHTML += `<option value="${p.id}">${p.nombre}</option>`;
    });

    // 2. AUTO-SELECCIÓN: Usamos el nombre con el que se logueó
    const nombreLogueado = loginUser.value.trim().toLowerCase();
    
    let encontrado = false;
    for (let i = 0; i < profesor.options.length; i++) {
        if (profesor.options[i].text.toLowerCase() === nombreLogueado) {
            profesor.selectedIndex = i;
            
            // --- AQUÍ ESTÁ EL BLOQUEO ---
            profesor.disabled = true; // Bloqueamos el desplegable para que no lo cambien
            
            // Disparamos manualmente el evento para que cargue las materias de ese profesor
            profesor.onchange(); 
            encontrado = true;
            break;
        }
    }

    if (!encontrado) {
        // Si por alguna razón el nombre del login no está en la tabla de profesores
        profesor.disabled = false; 
        console.warn("El usuario logueado no coincide con ningún profesor de la lista.");
    }
};

profesor.onchange = async () => {
  const { data } = await supabaseClient.from("profesores_materias").select("materia_id").eq("profesor_id", profesor.value);
  const ids = data.map(r => r.materia_id);
  const { data: mats } = await supabaseClient.from("materias").select("*").in("id", ids).order("nombre");
  materia.innerHTML = '<option value="">Seleccionar...</option>';
  materia.disabled = false;
  mats.forEach(m => materia.innerHTML += `<option value="${m.id}">${m.nombre}</option>`);
};

materia.onchange = async () => {
  horas.disabled = false;
  const { data } = await supabaseClient.from("profesores_materias_curso").select("curso_id").eq("profesor_id", profesor.value).eq("materia_id", materia.value);
  const ids = data.map(r => r.curso_id);
  const { data: curs } = await supabaseClient.from("curso").select("*").in("id", ids).order("nombre");
  curso.innerHTML = '<option value="">Seleccionar...</option>';
  curso.disabled = false;
  curs.forEach(c => curso.innerHTML += `<option value="${c.id}">${c.nombre} (${c.curso_base})</option>`);
};

async function dibujarAlumnos() {
  if (!curso.value) return;
  lista.innerHTML = "Cargando...";
  const { data: rel } = await supabaseClient.from("alumnos_por_curso").select("alumno_id").eq("curso_id", curso.value);
  const ids = rel.map(r => r.alumno_id);
  const { data: alus } = await supabaseClient.from("alumnos").select("*").in("id", ids).order("apellido");
  
  lista.innerHTML = "";
  alus.forEach(a => {
    let hHtml = `<span>H1:</span><select class="h1 estado-presente" onchange="actualizarColor(this)"><option value="presente">P</option><option value="ausente">A</option><option value="tarde">T</option></select>`;
    if (horas.value === "2") {
      hHtml += `<span>H2:</span><select class="h2 estado-presente" onchange="actualizarColor(this)"><option value="presente">P</option><option value="ausente">A</option><option value="tarde">T</option></select>`;
    }
    lista.innerHTML += `<div data-id="${a.id}"><b class="alumno-nombre">${a.apellido}, ${a.nombre}</b><div class="selector-hora">${hHtml}</div></div>`;
  });
  btnG.disabled = false;
}

curso.onchange = dibujarAlumnos;
horas.onchange = dibujarAlumnos;

btnG.onclick = () => enviar('normal');

async function enviar(modo) {
  if (!fecha.value || !curso.value) return alert("Faltan datos");
  btnG.disabled = true;
  btnG.textContent = "Procesando...";
  const regs = Array.from(document.querySelectorAll("#lista-alumnos div[data-id]")).map(f => ({
    fecha: fecha.value, profesor_id: profesor.value, materia_id: materia.value, curso_id: curso.value,
    alumno_id: f.dataset.id, hora1: f.querySelector(".h1").value,
    hora2: f.querySelector(".h2") ? f.querySelector(".h2").value : null
  }));

  if (modo === 'confirmar-sobrescribir') {
    let qB = supabaseClient.from("asistencia").delete().eq("fecha", fecha.value).eq("profesor_id", profesor.value).eq("materia_id", materia.value).eq("curso_id", curso.value);
    horas.value === "1" ? qB.is("hora2", null) : qB.not("hora2", "is", null);
    await qB;
  }

  const { error } = await supabaseClient.from("asistencia").insert(regs);
  if (error) { mensaje.innerHTML = `<p style="color:red">Error: ${error.message}</p>`; btnG.disabled = false; }
  else { mensaje.innerHTML = `<p style="color:green">✅ ¡Guardado!</p>`; setTimeout(() => location.reload(), 2000); }
}
</script>
</body>
</html>
