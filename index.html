<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Mise SEC - v.1.0.5</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    :root { --primary: #2c3e50; --secondary: #3498db; --success: #27ae60; --bg: #000; --card: #B3B3F2; }
    body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 15px; min-height: 100vh; }
    .container { width: 100%; max-width: 600px; background: var(--card); padding: 25px; border-radius: 12px; margin: 0 auto 20px auto; box-sizing: border-box; }
    .header-container { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--secondary); margin-bottom: 15px; }
    .logo { max-height: 45px; }
    
    .nav-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .btn-nav { flex: 1; padding: 12px; border: none; border-radius: 8px; background: #888; color: white; font-weight: bold; cursor: pointer; font-size: 14px; }
    .btn-nav.active { background: var(--secondary); box-shadow: 0 4px 8px rgba(0,0,0,0.2); }

    label { font-weight: 600; display: block; margin-bottom: 5px; color: #333; }
    select, input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #999; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
    
    #lista-alumnos div[data-id], .fila-reporte { background: #fff; border-left: 5px solid var(--secondary); padding: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-radius: 4px; }
    .alumno-nombre { font-size: 0.95em; font-weight: 600; flex: 1; color: var(--primary); }
    .selector-hora { display: flex; align-items: center; gap: 8px; }
    .selector-hora select { width: auto; font-size: 12px; margin: 0; padding: 5px; }
    
    .estado-ausente { background-color: #ffcccc !important; color: #900 !important; }
    .estado-tarde { background-color: #AAC2E3 !important; color: #0848A3 !important; }
    .estado-presente { background-color: #e6ffcc !important; color: #060 !important; }
    
    #guardar { width: 100%; background: var(--success); color: white; padding: 15px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
    .btn-alerta { padding: 12px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; margin: 5px; width: 100%; }
    
    .contador-faltas { padding: 4px 12px; border-radius: 20px; font-size: 14px; font-weight: bold; }
  </style>
</head>
